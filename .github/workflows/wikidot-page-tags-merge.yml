# Wikidot system:page-tags を巡回し、タグ一覧から記事へ逆引きして docs/scp_list.json の tags をマージする。
# 標準ライブラリのみの scripts/wikidot_page_tags_merge.py を使用。
name: Merge Wikidot page-tags into scp_list.json

on:
  workflow_dispatch:
    inputs:
      sleep_seconds:
        description: Wikidot へのリクエスト間隔（秒）
        type: string
        default: "0.35"
      max_tags:
        description: 処理するタグ数の上限（0 で全件・時間は長くなります）
        type: string
        default: "100"
      shuffle_tags:
        description: タグ処理順をシャッフルする（均等に網羅したいとき ON）
        type: boolean
        default: true
  schedule:
    # 毎日 17:30 UTC（翌 JST 02:30）：100 タグ＋シャッフル（約 1456 タグならおよそ 15 日で一通り）
    - cron: "30 17 * * *"

permissions:
  contents: write

concurrency:
  group: data-scp-docs-main-writes
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Merge page-tags into docs/scp_list.json
        env:
          GH_EVENT: ${{ github.event_name }}
          SLEEP: ${{ github.event.inputs.sleep_seconds }}
          MAX_TAGS_INPUT: ${{ github.event.inputs.max_tags }}
          SHUFFLE_INPUT: ${{ github.event.inputs.shuffle_tags }}
        run: |
          set -euo pipefail
          mkdir -p docs
          SLEEP_SEC="${SLEEP:-0.35}"

          if [ "${GH_EVENT}" = "schedule" ]; then
            LIMIT="100"
            SHUFFLE_ARGS=(--shuffle-tags)
          else
            LIMIT="${MAX_TAGS_INPUT:-100}"
            SHUFFLE_ARGS=()
            case "${SHUFFLE_INPUT:-true}" in
              true|True) SHUFFLE_ARGS=(--shuffle-tags) ;;
            esac
          fi

          python3 scripts/wikidot_page_tags_merge.py \
            --base-json-path docs/scp_list.json \
            --out docs/scp_list.json \
            --sleep "${SLEEP_SEC}" \
            --max-tags "${LIMIT}" \
            "${SHUFFLE_ARGS[@]}"
          ls -la docs/scp_list.json

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/scp_list.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git commit -m "chore(data): merge Wikidot page-tags into scp_list.json [skip ci]"
          git fetch origin main
          git rebase origin/main
          git push origin main
