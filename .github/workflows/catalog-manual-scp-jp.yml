# 手動のみ。Actions 一覧のラベル用。指定カテゴリの JSON のみ incremental 更新（他ファイルは触らない）。
name: "Catalog tags · SCP-JP label"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/wikidot-catalogs-reusable.yml
    with:
      sleep_seconds: "0.35"
      max_tags: "100"
      shuffle_tags: true
      mode: incremental
      categories: scp_jp
      tag_skip_limit: "-1"
    secrets: inherit
