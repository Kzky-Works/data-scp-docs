# 日次クロール（軽量）: 一覧ハブのみ取得。Tale 本文 (lu / img / desc) には触らず、前回値を引き継ぐ。
# Wikidot への日次リクエスト数を「数千 → 数十」に抑える。本文の鮮度は `weekly.yml` に委ねる。
name: Update list feeds (daily)

on:
  workflow_dispatch:
  schedule:
    # 旧 update.yml と同じ 00:00 UTC。
    - cron: "0 0 * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: data-scp-docs-list-jp-write
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euxo pipefail
          pip install -r requirements.txt

      - name: Register manifest merge driver
        run: |
          set -euo pipefail
          git config merge.scpmanifest.name "SCP manifest union merge"
          git config merge.scpmanifest.driver "python3 scripts/merge_manifest.py %O %A %B %P"

      - name: Run harvester (daily)
        run: |
          set -euxo pipefail
          python3 scripts/harvester.py --mode daily
          python3 scripts/validate_manifests.py
          ls -la list/jp/

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add list/jp/
          if git diff --staged --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git commit -m "chore(data): refresh list/jp feeds (daily) [skip ci]"
          git fetch origin main
          git rebase origin/main
          if grep -rl '^<<<<<<< ' list/jp/ >/dev/null 2>&1; then
            echo "ERROR: unresolved conflict markers remain after merge driver"
            exit 1
          fi
          git push origin main

      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          TITLE="CI failed: ${GITHUB_WORKFLOW} (run ${GITHUB_RUN_ID})"
          BODY=$(printf '%s\n\n- Workflow: %s\n- Run: %s\n- Trigger: %s\n- Ref: %s\n\nSee logs for details.' \
            "Workflow **${GITHUB_WORKFLOW}** failed." \
            "${GITHUB_WORKFLOW}" "${RUN_URL}" "${GITHUB_EVENT_NAME}" "${GITHUB_REF}")
          gh issue create --title "${TITLE}" --body "${BODY}"
