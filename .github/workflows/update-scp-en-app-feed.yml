# 本家メイン和訳一覧 → `docs/list/jp/scp.json`（ScpDocs EN 系統フィード）。
name: Update scp.json (app feed)

on:
  workflow_dispatch:
  schedule:
    - cron: "45 16 * * *"

permissions:
  contents: write

concurrency:
  group: data-scp-docs-main-writes
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euxo pipefail
          pip install -r requirements.txt
          pip freeze | grep -Ei '^(beautifulsoup4|requests)=' || true

      - name: Generate scp.json
        run: |
          set -euxo pipefail
          test -f docs/scp_list.json
          mkdir -p docs/list/jp
          python3 scripts/generate_scp_en_app_feed.py \
            --out docs/list/jp/scp.json \
            --merge-metadata-from docs/scp_list.json \
            --verbose
          ls -la docs/list/jp/scp.json

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/list/jp/scp.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git commit -m "chore(data): update scp.json app feed [skip ci]"
          git fetch origin main
          git rebase origin/main
          git push origin main
