name: "Catalog tags · Tales label"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/wikidot-catalogs-reusable.yml
    with:
      sleep_seconds: "0.35"
      max_tags: "100"
      shuffle_tags: true
      mode: incremental
      categories: tales
      tag_skip_limit: "-1"
    secrets: inherit
