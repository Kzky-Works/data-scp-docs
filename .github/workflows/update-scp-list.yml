# docs/scp_list.json を再生成して main に push（一覧＋国際ハブのみ。数分〜十数分）
name: Update scp_list.json

on:
  workflow_dispatch:
  schedule:
    # 毎週月曜 18:00 UTC。変更可。
    - cron: "0 18 * * 1"

permissions:
  contents: write

concurrency:
  group: update-scp-list
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate scp_list.json
        run: |
          mkdir -p docs
          python3 scripts/update_list.py --out docs/scp_list.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/scp_list.json
          if git diff --staged --quiet; then
            echo "No changes to docs/scp_list.json — skipping commit."
            exit 0
          fi
          git commit -m "chore(data): regenerate scp_list.json [skip ci]"
          git push
