# リポジトリ同梱の scripts/update_list.py で docs/scp_list.json を生成し、変更があれば push。
name: Update scp_list.json

on:
  workflow_dispatch:
  schedule:
    # 毎週月曜 18:00 UTC。変更可。
    - cron: "0 18 * * 1"

permissions:
  contents: write

concurrency:
  # 同一リポジトリへの push を直列化（週次ジョブとメタデータジョブの競合を防ぐ）
  group: data-scp-docs-main-writes
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euxo pipefail
          pip install -r requirements.txt
          pip freeze | grep -Ei '^(beautifulsoup4|requests)=' || true

      - name: Generate scp_list.json
        run: |
          set -euxo pipefail
          mkdir -p docs
          python3 scripts/update_list.py --out docs/scp_list.json
          ls -la docs/scp_list.json

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/scp_list.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git commit -m "chore(data): update scp_list.json [skip ci]"
          git fetch origin main
          git rebase origin/main
          git push origin main
