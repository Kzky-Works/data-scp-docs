# 各記事から objectClass / tags を取得（数時間かかる場合あり）。手動実行のみ。
# 実行前に app-scp-docs から update_list.py を同期する。
name: Update scp_list.json (with article metadata)

on:
  workflow_dispatch:

env:
  APP_SCP_DOCS_SCRIPT_URL: https://raw.githubusercontent.com/Kzky-Works/app-scp-docs/main/update_list.py

permissions:
  contents: write

concurrency:
  group: data-scp-docs-main-writes
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync scripts/update_list.py from app-scp-docs
        env:
          APP_SCP_DOCS_READ_TOKEN: ${{ secrets.APP_SCP_DOCS_READ_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p scripts
          if [ -n "${APP_SCP_DOCS_READ_TOKEN:-}" ]; then
            curl -fsSL \
              -H "Authorization: Bearer ${APP_SCP_DOCS_READ_TOKEN}" \
              -H "Accept: application/vnd.github.raw" \
              -o scripts/update_list.py \
              "https://api.github.com/repos/Kzky-Works/app-scp-docs/contents/update_list.py?ref=main"
          else
            curl -fsSL -o scripts/update_list.py "$APP_SCP_DOCS_SCRIPT_URL"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate scp_list.json with metadata
        run: |
          mkdir -p docs
          python3 scripts/update_list.py --out docs/scp_list.json --with-article-metadata

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/update_list.py docs/scp_list.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git commit -m "chore(data): sync script and/or scp_list.json (with metadata) [skip ci]"
          git fetch origin main
          git rebase origin/main
          git push origin main
