# 各記事から objectClass / tags を取得（初回のみ長時間になり得る）。増分・チェックポイント付き。
# スクリプトは本リポジトリの scripts/update_list.py。
name: Update scp_list.json (with article metadata)

on:
  workflow_dispatch:
  schedule:
    # 毎週日曜 15:00 UTC = 毎週月曜 00:00 JST（日本時間 0時・週1回）
    - cron: "0 15 * * 0"

permissions:
  contents: write

concurrency:
  group: data-scp-docs-main-writes
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euxo pipefail
          pip install -r requirements.txt
          pip freeze | grep -Ei '^(beautifulsoup4|requests)=' || true

      - name: Generate scp_list.json with metadata
        run: |
          set -euxo pipefail
          mkdir -p docs
          python3 scripts/update_list.py \
            --out docs/scp_list.json \
            --merge-metadata-from docs/scp_list.json \
            --with-article-metadata \
            --metadata-only-missing \
            --metadata-max-age-days 30 \
            --checkpoint-every 25 \
            --verbose

          ls -la docs/scp_list.json

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/scp_list.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git commit -m "chore(data): update scp_list.json (with metadata) [skip ci]"
          git fetch origin main
          git rebase origin/main
          git push origin main
