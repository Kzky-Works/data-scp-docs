# hubLinkedPaths のみ Wikidot 国際一覧から再取得（重い）。国内日次ジョブとは別実行。
name: Update scp_list.json (international hub)

on:
  workflow_dispatch:
  schedule:
    # 毎週月曜 16:00 UTC ≒ 翌日 01:00 JST（日次国内 15:00 UTC とずらす）
    - cron: "0 16 * * 1"

permissions:
  contents: write

concurrency:
  group: data-scp-docs-main-writes
  cancel-in-progress: false

jobs:
  update-hub:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euxo pipefail
          pip install -r requirements.txt

      - name: Refresh hubLinkedPaths only
        run: |
          set -euxo pipefail
          mkdir -p docs
          python3 scripts/update_list.py \
            --hub-linked-paths-only \
            --in-out docs/scp_list.json \
            --verbose
          ls -la docs/scp_list.json

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/scp_list.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git commit -m "chore(data): refresh hubLinkedPaths [skip ci]"
          git fetch origin main
          git rebase origin/main
          git push origin main
