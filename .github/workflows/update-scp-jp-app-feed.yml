# `scripts/generate_scp_jp_app_feed.py` でリポジトリ直下の `scp-jp.json`（ScpDocs 3 系統 JP フィード）を更新する。
# `docs/scp_list.json` から objectClass / tags / mainlistTranslationTitle をマージする前提（日次の scp_list ジョブの後に実行）。
name: Update scp-jp.json (app feed)

on:
  workflow_dispatch:
  schedule:
    # 毎日 16:30 UTC = 翌日 01:30 JST（Update scp_list.json の直後想定）
    - cron: "30 16 * * *"

permissions:
  contents: write

concurrency:
  group: data-scp-docs-main-writes
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euxo pipefail
          pip install -r requirements.txt
          pip freeze | grep -Ei '^(beautifulsoup4|requests)=' || true

      - name: Generate scp-jp.json
        run: |
          set -euxo pipefail
          test -f docs/scp_list.json
          python3 scripts/generate_scp_jp_app_feed.py \
            --out scp-jp.json \
            --merge-metadata-from docs/scp_list.json \
            --verbose
          ls -la scp-jp.json

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scp-jp.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git commit -m "chore(data): update scp-jp.json app feed [skip ci]"
          git fetch origin main
          git rebase origin/main
          git push origin main
